<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supporto - CashLoop</title>
  <style>
    /* Reset base */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
      line-height: 1.6;
    }

    /* Header fisso */
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #fff;
      border-bottom: 1px solid #ddd;
      text-align: center;
      padding: 20px 0;
      font-size: 1.8em;
      font-weight: bold;
      z-index: 1000;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    /* Container centrale scrollabile */
    .content-wrapper {
      max-width: 800px;
      margin: 120px auto 60px auto; /* spazio per header fisso */
      background-color: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      overflow-y: auto;
      text-align: center;
    }

    p {
      font-size: 1em;
      margin-bottom: 12px;
    }

    a {
      color: #1a73e8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      margin: 40px 0 20px 0;
      font-size: 0.9em;
      color: #888;
    }
  </style>
</head>
<body>
  <header>Supporto - CashLoop</header>

  <div class="content-wrapper">
    <p>Per assistenza sull'app CashLoop, puoi contattarci via email all'indirizzo:</p>
    <p><a href="mailto:domenicsteam@gmail.com">domenicsteam@gmail.com</a></p>
    <p>Risponderemo il prima possibile a tutte le richieste di supporto.</p>

    <footer>&copy; 2026 CashLoop. Tutti i diritti riservati.</footer>
  </div>
</body>
</html>
